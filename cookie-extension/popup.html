<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    h2 {
      margin: 0 0 12px 0;
      font-size: 16px;
      color: #333;
    }
    .status {
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 12px;
      margin-bottom: 12px;
    }
    .status.success {
      background: #d4edda;
      color: #155724;
    }
    .status.error {
      background: #f8d7da;
      color: #721c24;
    }
    .status.info {
      background: #d1ecf1;
      color: #0c5460;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
    }
    button:hover {
      background: #1d4ed8;
    }
    button:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }
    .settings {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #e5e7eb;
    }
    label {
      display: block;
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 4px;
    }
    input, select {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      font-size: 12px;
      box-sizing: border-box;
    }
    select {
      background: white;
    }
    select:disabled {
      background: #f3f4f6;
      color: #6b7280;
    }
    button.secondary {
      background: #f3f4f6;
      color: #374151;
      font-size: 12px;
      padding: 6px;
    }
    button.secondary:hover {
      background: #e5e7eb;
    }
    .cookie-preview {
      margin-top: 12px;
      padding: 8px;
      background: #f3f4f6;
      border-radius: 4px;
      font-size: 11px;
      font-family: monospace;
      max-height: 100px;
      overflow-y: auto;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <h2>Job Site Cookie Exporter</h2>
  <div id="status" class="status info">Navigate to bossjob.us or linkedin.com and login</div>
  <button id="exportBtn">Export Cookies to Dashboard</button>
  
  <div class="settings">
    <label>Dashboard API URL</label>
    <input type="text" id="apiUrl" value="http://localhost:8000" placeholder="http://localhost:8000">
    
    <label>Select Website Source</label>
    <select id="sourceSelect" disabled>
      <option value="">Loading sources...</option>
    </select>
    <button id="refreshBtn" class="secondary" style="margin-top: 8px;">Refresh Sources</button>
  </div>
  
  <div id="cookiePreview" class="cookie-preview" style="display: none;"></div>
  
  <script src="popup.js"></script>
</body>
</html>
